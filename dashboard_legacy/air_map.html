<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOHAR // ESTRATÉGICO_2026 // BCS_MONITOR</title>
    
    <!-- FUENTES: IBM Plex Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- MAPLIBRE GL JS (CSS + JS) -->
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

    <!-- TAILWIND CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tactical-dark': '#0a0a0a',
                        'neon-green': '#00FF41',
                        'neon-red': '#FF0000',
                        'neon-amber': '#FFB000',
                        'neon-yellow': '#FFFF00',
                    },
                    fontFamily: {
                        mono: ['"IBM Plex Mono"', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-tactical-dark text-neon-green font-mono overflow-hidden;
                text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
            }
            * { border-radius: 0 !important; }
        }
        .terminal-border { @apply border border-neon-green/30; }
        .terminal-bg { background-color: rgba(10, 10, 10, 0.85); backdrop-filter: blur(4px); }
        .cursor-blink::after { content: "█"; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        /* MapLibre Tactical Overrides */
        .maplibregl-ctrl-group { background: #0a0a0a !important; border: 1px solid #00FF4133 !important; }
        .maplibregl-ctrl-icon { filter: invert(1) sepia(1) saturate(5) hue-rotate(90deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00FF4133; }
        /* Tactical Popup Overrides */
        .tactical-popup .maplibregl-popup-content {
            background: #0a0a0a;
            color: #00FF41;
            border: 1px solid #00FF41;
            padding: 0;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        .tactical-popup .maplibregl-popup-tip {
            border-top-color: #00FF41;
        }
    </style>

    <!-- ALPINE.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="zoharApp()" x-init="initMap()">

    <!-- MAP CONTAINER -->
    <div id="map-container" class="fixed inset-0 bg-tactical-dark z-0"></div>

    <!-- SIDEBAR -->
    <aside class="fixed top-0 left-0 w-80 h-full z-10 p-4 pointer-events-none">
        <div class="h-full terminal-bg terminal-border flex flex-col pointer-events-auto shadow-2xl">
            
            <!-- HEADER -->
            <div class="p-4 border-b border-neon-green/30">
                <h1 class="text-xl font-bold tracking-tighter">
                    ZOHAR <span class="text-xs align-top">v2.4</span>
                </h1>
                <p class="text-[10px] text-neon-green/60 uppercase tracking-widest">Strategic_Gis_Core // BCS_BC</p>
                <a href="/" class="text-[9px] text-neon-amber underline mt-2 inline-block">←_VOLVER_DASHBOARD_DATOS</a>
            </div>

            <!-- SYSTEM STATUS -->
            <div class="p-4 bg-neon-green/5 space-y-2">
                <div class="flex justify-between text-xs items-center">
                    <span class="text-neon-green/60 uppercase">Estado:</span>
                    <span :class="loading ? 'animate-pulse text-neon-amber' : 'text-neon-green'" 
                          x-text="systemStatus"></span>
                </div>
                <div class="flex justify-between text-xs items-center">
                    <span class="text-neon-green/60 uppercase">Sensores:</span>
                    <span class="font-bold underline" x-text="sensoresActivos"></span>
                </div>
            </div>

            <!-- TELEMETRY LIST -->
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <div class="text-[10px] mb-4 border-l-2 border-neon-green/20 pl-2 opacity-50">
                    >>_-NIVELES_DE_CONTAMINACIÓN_DETECTADOS-
                </div>

                <div class="space-y-2">
                    <template x-for="sensor in sensores_data" :key="sensor.stationName">
                        <div class="p-2 border border-neon-green/10 hover:border-neon-green/40 hover:bg-neon-green/5 cursor-pointer transition-all group">
                            <div class="flex justify-between items-start">
                                <span class="text-[11px] font-bold group-hover:text-white truncate pr-2" x-text="sensor.stationName"></span>
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="w-2 h-2" :style="`background-color: ${getAqiColor(sensor.pm25)}`"></div>
                                <span class="text-[10px]">PM2.5: <b x-text="sensor.pm25"></b> μg/m³</span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- FOOTER -->
            <div class="p-4 border-t border-neon-green/30 text-[10px] flex justify-between font-bold">
                <span>LAT: 25.500°N</span>
                <span>LON: 111.500°W</span>
            </div>
        </div>
    </aside>

    <!-- LOADING INDICATOR -->
    <div x-show="loading" class="fixed bottom-4 right-4 z-20 flex items-center space-x-2 text-xs bg-tactical-dark p-2 border border-neon-amber text-neon-amber">
        <span class="animate-spin inline-block">▖</span>
        <span class="cursor-blink lowercase">sincronizando_telemetría_global...</span>
    </div>

    <!-- BOTÓN DE RETORNO FLOTANTE -->
    <a href="/" class="fixed top-4 right-20 z-20 bg-tactical-dark p-2 border border-neon-green text-[10px] font-bold text-neon-green hover:bg-neon-green hover:text-black transition-all">
        VOLVER A DATOS
    </a>

    <script>
        function getAqiColor(pm25) {
            if (pm25 <= 12) return '#00FF41'; 
            if (pm25 <= 35) return '#FFFF00'; 
            return '#FF0000';
        }

        function zoharApp() {
            return {
                loading: true,
                systemStatus: 'CONFIGURANDO_WEBGL...',
                sensoresActivos: 0,
                sensores_data: [],
                map: null,
                polling: null,

                initMap() {
                    this.map = new maplibregl.Map({
                        container: 'map-container',
                        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                        center: [-111.5, 25.5], 
                        zoom: 6.2,
                        antialias: true
                    });

                    this.map.on('load', async () => {
                        this.systemStatus = 'ENLACE_ESTABLECIDO';
                        await this.fetchTelemetry();
                        this.polling = setInterval(() => this.fetchTelemetry(), 300000);
                    });

                    this.map.addControl(new maplibregl.NavigationControl(), 'top-right');
                },

                async fetchTelemetry() {
                    const ENDPOINT = '/api/v1/sensors/geojson';
                    try {
                        const response = await fetch(ENDPOINT);
                        if (!response.ok) throw new Error("UPSTREAM_FAIL");
                        const geojson = await response.json();
                        this.sensores_data = geojson.features.map(f => f.properties);
                        this.sensoresActivos = geojson.features.length;
                        this.loading = false;

                        const source = this.map.getSource('sensores');
                        if (source) {
                            source.setData(geojson);
                        } else {
                            this.map.addSource('sensores', { type: 'geojson', data: geojson });
                            this.map.addLayer({
                                id: 'puntos-aire',
                                type: 'circle',
                                source: 'sensores',
                                paint: {
                                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 5, 4, 12, 14],
                                    'circle-color': ['step', ['get', 'pm25'], '#00FF41', 12, '#FFFF00', 35, '#FF0000'],
                                    'circle-opacity': 0.8,
                                    'circle-stroke-width': 2,
                                    'circle-stroke-color': '#0a0a0a'
                                }
                            });

                            // Evento de Clic para Popups
                            this.map.on('click', 'puntos-aire', (e) => {
                                const props = e.features[0].properties;
                                const coords = e.features[0].geometry.coordinates.slice();
                                
                                new maplibregl.Popup({ className: 'tactical-popup', closeButton: false })
                                    .setLngLat(coords)
                                    .setHTML(`
                                        <div class="p-2 font-mono text-[10px] space-y-1">
                                            <div class="border-b border-neon-green/30 pb-1 mb-1 font-bold">
                                                ID_${props.id} // ${props.stationName}
                                            </div>
                                            <div class="flex justify-between">
                                                <span>PM2.5:</span>
                                                <b class="text-white">${parseFloat(props.pm25).toFixed(2)}</b>
                                            </div>
                                            <div class="flex justify-between">
                                                <span>STATUS:</span>
                                                <b style="color:${getAqiColor(props.pm25)}">${props.aqi_level}</b>
                                            </div>
                                        </div>
                                    `)
                                    .addTo(this.map);
                            });

                            // Cursor Crosshair
                            this.map.on('mouseenter', 'puntos-aire', () => {
                                this.map.getCanvas().style.cursor = 'crosshair';
                            });
                            this.map.on('mouseleave', 'puntos-aire', () => {
                                this.map.getCanvas().style.cursor = '';
                            });
                        }
                    } catch (err) {
                        this.systemStatus = 'ERROR_DE_ENLACE';
                        console.error("[ZOHAR_ERROR]", err);
                    }
                }
            }
        }
    </script>
</body>
</html>
