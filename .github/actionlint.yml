# Configuración de actionlint para silenciar falsos positivos de secrets
# Referencia: https://github.com/rhysd/actionlint/blob/main/docs/config.md

self-hosted-runner:
  labels: []

# Secrets conocidos del repositorio — le decimos al linter que existen
# para que no genere warnings de "Context access might be invalid"
config:
  # La validación de secrets requiere acceso a la API de GitHub,
  # que actionlint no tiene en análisis estático.
  # Desactivamos el chequeo de secrets para evitar falsos positivos.
