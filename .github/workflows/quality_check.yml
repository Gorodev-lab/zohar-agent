name: Zohar Continuous Quality (CDD)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Mantener tiempos bajos de CI reproduciendo el entorno local mínimo
    strategy:
      fail-fast: false

    services:
      # Podríamos simular Supabase o Redis aquí si fuera necesario
      pass:
        image: busybox
        ports: ["8081:8081"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        # Cache automático de pip para acelerar runs repetidas
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run TDD Suite (Red/Green)
      env:
        # Mocking keys for CI environment
        SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || '' }}
        SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || '' }}
        SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || '' }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || '' }}
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY || '' }}
      run: |
        pytest test_zohar_agent.py test_zohar_api.py
