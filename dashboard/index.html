<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOHAR // TERMINAL_V1 // AMBER_PHOSPHOR</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #ffb000;
            --amber-dim: #7c5600;
            --bg: #000000;
            --font: 'Fira Code', monospace;
        }

        [x-cloak] { display: none !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            background-color: var(--bg);
            color: var(--amber);
            font-family: var(--font);
            font-size: 13px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-shadow: 0 0 5px var(--amber-dim);
        }

        /* ── CRT EFFECT ── */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            border-bottom: 2px solid var(--amber);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title { font-weight: 700; font-size: 18px; letter-spacing: 2px; }

        /* ── TABS ── */
        .tabs {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--amber);
            padding-left: 20px;
        }
        .tab {
            padding: 8px 20px;
            cursor: pointer;
            border-right: 1px solid var(--amber);
            font-weight: 700;
            text-transform: uppercase;
        }
        .tab:hover { background: var(--amber); color: var(--bg); }
        .tab.active { background: var(--amber); color: var(--bg); }

        main {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr 200px;
            overflow: hidden;
        }

        .data-viewer {
            overflow: auto;
            border-bottom: 1px solid var(--amber);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            position: sticky;
            top: 0;
            background: var(--bg);
            color: var(--amber);
            text-align: left;
            padding: 10px;
            border-bottom: 2px solid var(--amber);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }
        th:hover { text-decoration: underline; background: #1a1500; }
        
        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--amber-dim);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }
        tr:hover td { background: #1a1500; }
        tr.selected td { background: var(--amber-dim); color: #fff; }

        .sort-icon { font-size: 10px; margin-left: 5px; }

        /* ── BOTTOM PANEL ── */
        .bottom-panel {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1px;
            background: var(--amber);
        }
        .panel-sec { background: var(--bg); padding: 10px; overflow-y: auto; }

        .log-line { font-size: 11px; margin-bottom: 2px; }
        .log-ts { color: var(--amber-dim); }
        .log-msg { color: var(--amber); }

        .detail-view { font-size: 12px; line-height: 1.5; }
        .detail-row { display: flex; margin-bottom: 5px; }
        .detail-key { width: 120px; color: var(--amber-dim); font-weight: 700; text-transform: uppercase; }
        .detail-val { flex: 1; color: var(--amber); }

        footer {
            border-top: 1px solid var(--amber);
            padding: 5px 20px;
            font-size: 10px;
            display: flex;
            justify-content: space-between;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--amber-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--amber); }
    </style>
</head>
<body x-data="zoharApp()" x-init="init()" x-cloak>

    <header>
        <div class="header-title">ZOHAR // TERMINAL_DATA_CORE // V1.0</div>
        <div style="font-size: 12px;">
            CPU_TEMP: <span x-text="status.cpu_temp || 'N/A'"></span> | 
            UPTIME: <span x-text="uptime"></span> |
            MODE: [READ_WRITE]
        </div>
    </header>

    <!-- TAB SELECTOR -->
    <div class="tabs">
        <div class="tab" :class="activeTab === 'projects' ? 'active' : ''" @click="setTab('projects')">[ PROJECTS ]</div>
        <div class="tab" :class="activeTab === 'financial' ? 'active' : ''" @click="setTab('financial')">[ FINANCIAL_CSV ]</div>
        <div class="tab" :class="activeTab === 'regulatory' ? 'active' : ''" @click="setTab('regulatory')">[ REGULATORY_CSV ]</div>
        <div class="tab" :class="activeTab === 'air_quality' ? 'active' : ''" @click="setTab('air_quality')">[ AIR_QUALITY_DATA ]</div>
        <a href="/aire" target="_blank" class="tab" style="margin-left:auto; margin-right:0; border-left:1px solid var(--amber); border-right:none; color:inherit; text-decoration:none; display:flex; align-items:center; gap:6px;">
            🗺️&nbsp;[ MAPA_CALIDAD_AIRE ]
        </a>
    </div>

    <main>
        <!-- MAIN DATA TABLE -->
        <div class="data-viewer">
            <table>
                <thead>
                    <tr>
                        <template x-for="col in columns">
                            <th @click="sort(col)">
                                <span x-text="col.replace(/_/g, ' ')"></span>
                                <span class="sort-icon" x-show="sortKey === col" x-text="sortAsc ? '▲' : '▼'"></span>
                            </th>
                        </template>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="row in sortedData">
                        <tr @click="selectedRow = row" :class="selectedRow === row ? 'selected' : ''">
                            <template x-for="col in columns">
                                <td x-text="row[col]"></td>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- CONSOLE AND DETAILS -->
        <div class="bottom-panel">
            <div class="panel-sec">
                <div style="color: var(--amber-dim); margin-bottom: 10px; font-weight: 700;">// SYSTEM_ACTIVITY_STREAM</div>
                <div id="logs">
                    <template x-for="log in agentLogs">
                        <div class="log-line">
                            <span class="log-ts" x-text="log.ts.slice(11, 19)"></span>
                            <span style="font-weight: 700;" :style="log.level === 'ERR' ? 'color:red' : ''" x-text="' [' + log.level + '] '"></span>
                            <span class="log-msg" x-text="log.msg"></span>
                        </div>
                    </template>
                </div>
            </div>
            <div class="panel-sec" style="border-left: 1px solid var(--amber);">
                <div style="color: var(--amber-dim); margin-bottom: 10px; font-weight: 700;">// RECORD_DETAILS</div>
                <div class="detail-view">
                    <template x-if="!selectedRow">
                        <div style="color: var(--amber-dim); font-style: italic;">[ NO_RECORD_SELECTED ]</div>
                    </template>
                    <template x-if="selectedRow">
                        <div>
                            <template x-for="(val, key) in selectedRow">
                                <div class="detail-row">
                                    <div class="detail-key" x-text="key.replace(/_/g, ' ')"></div>
                                    <div class="detail-val" x-text="val"></div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div x-text="'ZOHAR_CORE: ' + (status.agent_running ? 'LINK_ACTIVE' : 'LINK_OFFLINE')"></div>
        <div x-text="currentTime"></div>
        <div>(C) 2026 ZOHAR_INTEL // PRESERVE_INTEGRITY</div>
    </footer>

    <script>
        function zoharApp() {
            return {
                status: {},
                activeTab: 'projects',
                data: [],
                columns: [],
                agentLogs: [],
                uptime: '00:00:00',
                currentTime: '',
                startTime: Date.now(),
                selectedRow: null,
                sortKey: '',
                sortAsc: true,

                init() {
                    this.updateTime();
                    this.fetchData();
                    setInterval(() => this.updateTime(), 1000);
                    setInterval(() => this.fetchSidebarData(), 5000);
                    this.setTab('projects');
                },

                updateTime() {
                    const now = new Date();
                    this.currentTime = now.toLocaleTimeString('en-US', { hour12: false });
                    const diff = Math.floor((Date.now() - this.startTime) / 1000);
                    const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                    const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                    const s = (diff % 60).toString().padStart(2, '0');
                    this.uptime = `${h}:${m}:${s}`;
                },

                async fetchSidebarData() {
                    const h = { 'bypass-tunnel-reminder': 'true' };
                    try {
                        const [s, l] = await Promise.all([
                            fetch('/api/status', { headers: h }).then(r => r.json()),
                            fetch('/api/logs', { headers: h }).then(r => r.json().catch(() => []))
                        ]);
                        this.status = s;
                        this.agentLogs = l.slice(-30);
                        this.$nextTick(() => {
                           const el = document.getElementById('logs');
                           if(el) el.scrollTop = el.scrollHeight;
                        });
                    } catch (e) {}
                },

                async setTab(tab) {
                    this.activeTab = tab;
                    this.data = [];
                    this.columns = [];
                    this.selectedRow = null;
                    const h = { 'bypass-tunnel-reminder': 'true' };
                    
                    let url = '/api/projects';
                    if (tab === 'regulatory') url = '/api/csv_data?type=regulatory';
                    if (tab === 'financial') url = '/api/csv_data?type=financial';
                    if (tab === 'air_quality') url = '/api/csv_data?type=air_quality&limit=50';

                    try {
                        const res = await fetch(url, { headers: h }).then(r => r.json());
                        // si es array recortarlo para no saturar AlpineJS (el mapa carga completo)
                        this.data = tab === 'air_quality' && res.length > 50 ? res.slice(0, 50) : res;
                        if (this.data.length > 0) {
                            this.columns = Object.keys(this.data[0]);
                        }
                    } catch (e) {
                        console.error('Data fetch error:', e);
                    }
                },

                sort(key) {
                    if (this.sortKey === key) {
                        this.sortAsc = !this.sortAsc;
                    } else {
                        this.sortKey = key;
                        this.sortAsc = true;
                    }
                },

                get sortedData() {
                    if (!this.sortKey) return this.data;
                    return [...this.data].sort((a, b) => {
                        let va = a[this.sortKey];
                        let vb = b[this.sortKey];
                        if (va < vb) return this.sortAsc ? -1 : 1;
                        if (va > vb) return this.sortAsc ? 1 : -1;
                        return 0;
                    });
                },

                fetchData() {
                    this.fetchSidebarData();
                }
            }
        }
    </script>
</body>
</html>
